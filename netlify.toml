[build]
  # Frontend is plain static HTML, so no build step is required.
  command = ""
  publish = "."
  functions = "functions"
  functionsNodeVersion = "18"

[build.environment]
  NODE_VERSION = "18"

# Netlify Functions will handle /api/*, static files are served from the repo root.


[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server/:splat"

  status = 200

