<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Hanverse Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{

--red:#F4D35E;
--yellow:#E63946;
--blue:#4EA8DE;
--green:#74C69D;
--bg:#FFFDF7;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:var(--bg);

min-height:100vh;

display:flex;

justify-content:center;
align-items:center;

padding:25px;

overflow:hidden;

}


/* CONTAINER */

.container{

display:flex;

width:100%;

max-width:1100px;

background:white;

border-radius:40px;

overflow:hidden;

box-shadow:
0 15px 35px rgba(0,0,0,.08);

animation:fade .8s;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}


/* LEFT */

.left{

flex:1;

background:
linear-gradient(
135deg,
var(--blue),
#7bc7f4
);

padding:60px;

color:white;

display:flex;

flex-direction:column;

justify-content:center;

position:relative;

}

.left h1{

font-size:45px;

margin:20px 0;

}

.left p{

line-height:1.8;

}


.panda{

font-size:120px;

margin-top:30px;

animation:float 4s infinite;

}

.star{

position:absolute;

font-size:40px;

color:var(--yellow);

right:50px;
top:50px;

}

 @keyframes float{
 
 50%{

 transform:
 translateY(-15px);

 }

 }

 @keyframes n-shake{
 0%,100%{transform:translateX(0);}
 15%{transform:translateX(-8px);}
 30%{transform:translateX(8px);}
 45%{transform:translateX(-5px);}
 60%{transform:translateX(5px);}
 75%{transform:translateX(-2px);}
 }
 .n-shake{animation:n-shake .55s ease;}



/* RIGHT */

.right{

flex:1;

padding:60px;

display:flex;

justify-content:center;

flex-direction:column;

}


.logo{

font-size:35px;

font-weight:700;

color:var(--red);

margin-bottom:15px;

}

.subtitle{

margin-bottom:35px;

color:#777;

}


.input-group{

margin-bottom:20px;

position:relative;

}


input{

width:100%;

padding:18px;

border:none;

border-radius:18px;

background:#f4f4f4;

font-size:16px;

}

input:focus{

outline:2px solid var(--blue);

}


.eye{

position:absolute;

right:20px;
top:20px;

cursor:pointer;

}


.btn{

width:100%;

padding:16px;

border:none;

border-radius:40px;

font-weight:600;

cursor:pointer;

margin-top:10px;

transition:.3s;

}


.login{

background:var(--red);

color:white;

}


.google{

background:white;

border:2px solid #eee;

margin-top:15px;

}

.btn:hover{

transform:translateY(-3px);

}


.bottom{

margin-top:30px;

text-align:center;

}


.bottom a{

color:var(--red);

text-decoration:none;

font-weight:600;

}


@media(max-width:900px){

.container{

flex-direction:column;

}

.left{

padding:40px;

text-align:center;

}

.right{

padding:40px;

}

}

</style>
</head>

<body>


<div class="container">

<div class="left">

<div class="star">

⭐

</div>

<p>

Welcome to

</p>

<h1>

Hanverse

</h1>

<p>

Continue your Mandarin learning journey with stories, games and structured YCT lessons.

</p>

<div class="panda">

🐼

</div>

</div>



<div class="right">

<div class="logo">

Hanverse

</div>

<p class="subtitle">

Log in to continue learning

</p>



<div class="input-group">
<input
  type="email"
  id="email"
  placeholder="Email">
</div>



<div class="input-group">
<input
  type="password"
  id="password"
  placeholder="Password">

<span
class="eye"
onclick="toggle()">

👁️

</span>

</div>



<button class="btn login" id="loginBtn">
Log In
</button>



<button class="btn google">

🌐 Continue with Google

</button>



<div class="bottom">

Don't have an account?

<a href="signup.html">

Sign Up

</a>

</div>



</div>

</div>



<script src="notifications.js"></script>

<script>

function comingSoon(e){e&&e.preventDefault();Notify.toast('Coming soon! 🚀','info',3000);}

function addRipple(e,color){
  const btn=e.currentTarget;
  const rect=btn.getBoundingClientRect();
  const r=document.createElement('div');
  r.className='n-ripple-container';
  const ring=document.createElement('div');
  ring.className='n-ripple';
  ring.style.cssText=`width:30px;height:30px;left:${e.clientX-rect.left-15}px;top:${e.clientY-rect.top-15}px;background:${color||'rgba(78,168,222,.35)'};`;
  btn.style.position='relative'; btn.style.overflow='hidden';
  btn.appendChild(r); r.appendChild(ring);
  setTimeout(()=>r.remove(),700);
}
function shake(el){
  el.classList.remove('n-shake');
  void el.offsetWidth;
  el.classList.add('n-shake');
  setTimeout(()=>el.classList.remove('n-shake'),600);
}
function toggle(){
  const pw=document.getElementById('password');
  pw.type=pw.type==='password'?'text':'password';
  Notify.toast(pw.type==='text'?'Password visible 👁️':'Password hidden 🔒','info',1500);
}

const API_URL = '/api';

/* ── Input focus toasts ── */
document.getElementById('email').addEventListener('focus',()=>Notify.toast('Enter your email address 📧','info',1800));
document.getElementById('password').addEventListener('focus',()=>Notify.toast('Enter your password 🔐','info',1800));

async function login(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;

  if(!email||!password){
    Notify.toast('Please enter both email and password! 📧','error',3000);
    shake(document.getElementById('email').parentElement);
    return;
  }

  const btn=document.getElementById('loginBtn');
  btn.disabled=true;
  btn.textContent='Signing in… 🔄';
  Notify.toast('Connecting to database… 🗄️','info',2500);

  try {
    const resp=await fetch(API_URL+'/login',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password})
    });
    const data=await resp.json();

    if(!resp.ok||!data.success){
      btn.disabled=false;
      btn.textContent='Log In';
      if(resp.status===503||resp.status===500){
        Notify.toast('Database is connecting… please try again 💫','error',4500);
      } else {
        Notify.toast(data.error||'Login failed. Check your details. ❌','error',4000);
      }
      shake(btn);
      return;
    }

    localStorage.setItem('hanverse_user', JSON.stringify({
      user_id:data.user.user_id,
      username:data.user.username,
      fullName:data.user.full_name,
      email:data.user.email,
      xp:data.user.xp,
      level:data.user.level,
      streak:data.user.streak_days,
      profile_picture:data.user.profile_picture,
      created_at:data.user.created_at,
    }));

    const user=data.user;
    Notify.toast('Login successful! Welcome back! 🎉','success',2500);
    Notify.showXP(50);
    Notify.miniConfetti();

    if(user.streak&&user.streak>=7) Notify.streakFire(user.streak);
    if(user.level>=5) Notify.toast(`Level ${user.level} — amazing progress! 🏆`,'star',3000);

    setTimeout(()=>window.location.href='profile.html',900);
  } catch(e){
    console.error(e);
    btn.disabled=false;
    btn.textContent='Log In';
    Notify.toast('Cannot reach server. Check your connection. 🌐','error',5000);
  }
}

document.getElementById('loginBtn').addEventListener('click',(e)=>{
  e.preventDefault();
  addRipple(e);
  login();
});
document.querySelectorAll('.btn,.google').forEach(btn=>{
  btn.addEventListener('click',e=>addRipple(e));
});

const panda=document.querySelector('.panda');
if(panda){
  panda.addEventListener('click',()=>{
    Notify.toast('Panda loves Mandarin learners! 🐼💜','heart',2500);
    Notify.showXP(5);
  });
}
document.querySelector('.google').addEventListener('click',()=>{
  Notify.toast('Google sign-in coming soon! 😊','info',3000);
});

window.addEventListener('load',()=>{
  setTimeout(()=>{
    Notify.toast('Welcome back! Log in to continue learning ✨','star',3000);
    Notify.miniConfetti();
  },800);
});
</script>


</body>
</html>
